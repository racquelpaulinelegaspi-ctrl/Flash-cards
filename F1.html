<!DOCTYPE html>
<html>
<head>
  <title>Foundations Module 1 Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 style="text-align:center;">Foundations Module 1 Flashcards</h1>
  <div id="flashcard" class="card">
    <div class="card-inner">
      <div class="card-front" aria-hidden="false"></div>
      <div class="card-back" aria-hidden="true"></div>
    </div>
  </div>
  <div class="controls">
    <button id="flip">Flip</button>
    <button id="next">Next</button>
  </div>
  <div id="end"></div>

  <script>
    let cards = [];
    let currentIndex = 0;
    let flipped = false;

    // Replace with your published Google Sheet CSV link
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT0D3KrPGD0aWICyomVjZwwgx6eZNARFpFIqPgF4H78Bp9_QwZ1RZC6oTqzyl-FrcpEeZdZfa345kCE/pub?output=csv";

    // Load cards from Google Sheet CSV
    fetch(sheetUrl)
      .then(response => response.text())
      .then(text => {
        const rows = text.split("\n").map(row => row.split(","));
        // Skip the first two rows, use Column A (r[0]) as front and Column B (r[1]) as back
        cards = rows.slice(2).map(r => ({ front: r[0], back: r[1] }));
        showCard();
      });

    function showCard() {
      const cardFront = document.querySelector('.card-front');
      const cardBack = document.querySelector('.card-back');
      cardFront.textContent = cards[currentIndex].front;
      cardBack.textContent = cards[currentIndex].back;

      // Reset to front view
      document.querySelector('.card-inner').style.transform = 'rotateY(0deg)';
      cardFront.setAttribute('aria-hidden', 'false');
      cardBack.setAttribute('aria-hidden', 'true');
      flipped = false;
    }

    document.getElementById('flip').onclick = () => {
      const cardInner = document.querySelector('.card-inner');
      const cardFront = document.querySelector('.card-front');
      const cardBack = document.querySelector('.card-back');

      if (flipped) {
        cardInner.style.transform = 'rotateY(0deg)';
        cardFront.setAttribute('aria-hidden', 'false');
        cardBack.setAttribute('aria-hidden', 'true');
        flipped = false;
      } else {
        cardInner.style.transform = 'rotateY(180deg)';
        cardFront.setAttribute('aria-hidden', 'true');
        cardBack.setAttribute('aria-hidden', 'false');
        flipped = true;
      }
    };

    document.getElementById('next').onclick = () => {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        showCard();
      } else {
        document.getElementById('flashcard').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('end').innerHTML =
          "<div class='end-message'>🎉 Congratulations! You’ve completed all the flashcards! 🎉</div>" +
          "<div style='text-align:center; margin-top:20px;'><button id='restart'>Restart</button></div>";

        // Restart functionality
        document.getElementById('restart').onclick = () => {
          currentIndex = 0;
          document.getElementById('flashcard').style.display = 'block';
          document.querySelector('.controls').style.display = 'block';
          document.getElementById('end').innerHTML = '';
          showCard();
        };
      }
    };
  </script>
</body>
</html>
