<!DOCTYPE html>
<html>
<head>
  <title>Foundations Module 1 Flashcards</title>
  <style>
    .card {
      width: 300px;
      height: 180px;
      perspective: 1000px;
      margin: 20px auto;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .card-back {
      transform: rotateY(180deg);
      background: #f0f0f0;
    }
    .controls {
      text-align: center;
      margin-top: 15px;
    }
    button {
      margin: 5px;
      padding: 8px 16px;
      font-size: 16px;
    }
    .end-message {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: green;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Foundations Module 1 Flashcards</h1>
  <div id="flashcard" class="card">
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back"></div>
    </div>
  </div>
  <div class="controls">
    <button id="flip">Flip</button>
    <button id="back">Back</button>
    <button id="next">Next</button>
  </div>
  <div id="end"></div>

  <script>
    let cards = [];
    let currentIndex = 0;

    // Load cards from JSON file
    fetch('F1.json')
      .then(response => response.json())
      .then(data => {
        cards = data;
        showCard();
      });

    function showCard() {
      const cardFront = document.querySelector('.card-front');
      const cardBack = document.querySelector('.card-back');
      cardFront.textContent = cards[currentIndex].front;
      cardBack.textContent = cards[currentIndex].back;
      document.querySelector('.card-inner').style.transform = 'rotateY(0deg)';
    }

    document.getElementById('flip').onclick = () => {
      document.querySelector('.card-inner').style.transform = 'rotateY(180deg)';
    };

    document.getElementById('back').onclick = () => {
      document.querySelector('.card-inner').style.transform = 'rotateY(0deg)';
    };

    document.getElementById('next').onclick = () => {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        showCard();
      } else {
        document.getElementById('flashcard').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('end').innerHTML =
          "<div class='end-message'>🎉 Congratulations! You’ve completed all the flashcards! 🎉</div>";
      }
    };
  </script>
</body>
</html>
