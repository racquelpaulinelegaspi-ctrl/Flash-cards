<!DOCTYPE html>
<html>
<head>
  <title>Foundations Module 1 Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <!-- Include PapaParse library -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1 style="text-align:center;">Foundations Module 1 Flashcards</h1>
  <div id="flashcard" class="card" tabindex="-1">
    <div class="card-inner">
      <div class="card-front" aria-hidden="false"></div>
      <div class="card-back" aria-hidden="true"></div>
    </div>
  </div>
  <div id="progress" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
  <div class="controls">
    <button id="flip">Flip</button>
    <button id="back">Back</button>
    <button id="next">Next</button>
  </div>
  <div id="end"></div>

  <script>
    let cards = [];
    let currentIndex = 0;
    let flipped = false;

    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT0D3KrPGD0aWICyomVjZwwgx6eZNARFpFIqPgF4H78Bp9_QwZ1RZC6oTqzyl-FrcpEeZdZfa345kCE/pub?output=csv";

    fetch(sheetUrl)
      .then(response => response.text())
      .then(text => {
        const parsed = Papa.parse(text, { header: false });
        const rows = parsed.data;

        // Use column D (index 3) for front, column E (index 4) for back
        cards = rows.slice(2)
          .filter(r => r[3] && r[4] && r[3].trim() !== "" && r[4].trim() !== "")
          .map(r => ({ front: r[3], back: r[4] }));

        if (cards.length > 0) {
          showCard();
        } else {
          document.getElementById('flashcard').style.display = 'none';
          document.querySelector('.controls').style.display = 'none';
          document.getElementById('end').innerHTML =
            "<div class='end-message'>⚠️ No valid flashcards found in your sheet.</div>";
        }
      });

    function showCard() {
      const cardFront = document.querySelector('.card-front');
      const cardBack = document.querySelector('.card-back');
      cardFront.textContent = cards[currentIndex].front;
      cardBack.textContent = cards[currentIndex].back;

      document.querySelector('.card-inner').style.transform = 'rotateY(0deg)';
      cardFront.setAttribute('aria-hidden', 'false');
      cardBack.setAttribute('aria-hidden', 'true');
      flipped = false;

      updateBackButton();
      updateProgress();
    }

    function focusFlashcard() {
      const flashcard = document.getElementById('flashcard');
      flashcard.focus();
    }

    function updateBackButton() {
      const backBtn = document.getElementById('back');
      if (currentIndex === 0) {
        backBtn.style.display = 'none';
      } else {
        backBtn.style.display = 'inline-block';
      }
    }

    function updateProgress() {
      const progress = document.getElementById('progress');
      progress.textContent = `Card ${currentIndex + 1} of ${cards.length}`;
    }

    document.getElementById('flip').onclick = () => {
      const cardInner = document.querySelector('.card-inner');
      const cardFront = document.querySelector('.card-front');
      const cardBack = document.querySelector('.card-back');

      if (flipped) {
        cardInner.style.transform = 'rotateY(0deg)';
        cardFront.setAttribute('aria-hidden', 'false');
        cardBack.setAttribute('aria-hidden', 'true');
        flipped = false;
      } else {
        cardInner.style.transform = 'rotateY(180deg)';
        cardFront.setAttribute('aria-hidden', 'true');
        cardBack.setAttribute('aria-hidden', 'false');
        flipped = true;
      }
      focusFlashcard();
    };

    document.getElementById('next').onclick = () => {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        showCard();
        focusFlashcard();
      } else {
        document.getElementById('flashcard').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('end').innerHTML =
          "<div class='end-message'>🎉 Congratulations! You’ve completed all the flashcards! 🎉</div>" +
          "<div style='text-align:center; margin-top:20px;'><button id='restart'>Restart</button></div>";

        document.getElementById('restart').onclick = () => {
          currentIndex = 0;
          document.getElementById('flashcard').style.display = 'block';
          document.querySelector('.controls').style.display = 'block';
          document.getElementById('progress').style.display = 'block';
          document.getElementById('end').innerHTML = '';
          showCard();
          focusFlashcard();
        };
      }
    };

    document.getElementById('back').onclick = () => {
      if (currentIndex > 0) {
        currentIndex--;
        showCard();
        setTimeout(() => {
          focusFlashcard();
        }, 50);
      }
    };
  </script>
</body>
</html>
